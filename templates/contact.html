{% extends 'base.html' %}
{% block content %}
<h2>Contact Us</h2>
<form id="contact-form">
  <div class="mb-3">
    <input class="form-control" type="text" name="from_name" placeholder="Your name">
  </div>
  <div class="mb-3">
    <input class="form-control" type="email" name="reply_to" placeholder="Your email">
  </div>
  <div class="mb-3">
    <textarea class="form-control" name="message" rows="4" placeholder="Your message"></textarea>
  </div>
  <button class="btn btn-primary" type="submit">Send Message</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init('YOUR_EMAILJS_USER_ID'); // <- replace with your EmailJS user ID
  })();

  document.getElementById('contact-form').addEventListener('submit', function(e){
    e.preventDefault();
    emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
      .then(function(){ alert('Message sent!'); }, function(err){ alert('Failed to send message: ' + JSON.stringify(err)); });
  });
</script>
{% endblock %}
